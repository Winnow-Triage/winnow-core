name: CI — Build, Test & Drift Detection

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

jobs:
  # ── Job 1: Build & Test ────────────────────────────────────────────────────
  test:
    name: Build & Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: winnow
          POSTGRES_PASSWORD: winnow_test
          POSTGRES_DB: winnow_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U winnow"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=5

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore Winnow.sln

      - name: Build
        run: dotnet build Winnow.sln --no-restore

      - name: Test
        run: dotnet test Winnow.sln --no-build --verbosity normal
        env:
          ConnectionStrings__Postgres: "Host=localhost;Port=5432;Database=winnow_test;Username=winnow;Password=winnow_test"

  # ── Job 2: Migration Drift Detection ───────────────────────────────────────
  drift-detection:
    name: Migration Drift Detection
    runs-on: ubuntu-latest
    needs: test

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: winnow
          POSTGRES_PASSWORD: winnow_test
          POSTGRES_DB: winnow_drift
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U winnow"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=5

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Install EF Core Tools
        run: dotnet tool install --global dotnet-ef

      - name: Restore
        run: dotnet restore Winnow.sln

      - name: Build
        run: dotnet build Winnow.sln --no-restore

      - name: Check Postgres drift
        working-directory: src/Services/Winnow.API
        env:
          DatabaseProvider: Postgres
          ConnectionStrings__Postgres: "Host=localhost;Port=5432;Database=winnow_drift;Username=winnow;Password=winnow_test"
        run: |
          echo "🔍 Checking Postgres for pending model changes..."
          dotnet ef migrations has-pending-model-changes
          echo "✅ Postgres migrations are in sync."

  # ── Job 3: E2E Playwright Tests ────────────────────────────────────────────
  e2e:
    name: E2E Playwright Tests
    runs-on: ubuntu-latest
    needs: test

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: winnow
          POSTGRES_PASSWORD: localpassword
          POSTGRES_DB: winnow_db
        ports:
          - 5432:5432
      redis:
        image: redis:alpine
        ports:
          - 6379:6379
      ministack:
        image: nahuelnucera/ministack:latest
        env:
          S3_PERSIST: 0
          SERVICES: s3,sqs
        ports:
          - 4566:4566
      rabbitmq:
        image: rabbitmq:3-management
        ports:
          - 5672:5672
          - 15672:15672
      presidio-analyzer:
        image: mcr.microsoft.com/presidio-analyzer:latest
        env:
          PORT: 3000
        ports:
          - 5002:3000

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Restore & Build API
        run: |
          dotnet restore Winnow.sln
          dotnet build src/Services/Winnow.API/Winnow.API.csproj --configuration Release

      - name: Setup Ministack Buckets
        run: |
          docker run --network host amazon/aws-cli:latest --endpoint-url=http://localhost:4566 s3 mb s3://winnow-quarantine || true
          docker run --network host amazon/aws-cli:latest --endpoint-url=http://localhost:4566 s3 mb s3://winnow-clean || true
          docker run --network host amazon/aws-cli:latest --endpoint-url=http://localhost:4566 s3 mb s3://winnow-security-defs || true

      - name: Start Winnow API
        env:
          ASPNETCORE_ENVIRONMENT: Development
          ASPNETCORE_URLS: "http://localhost:5294"
          ConnectionStrings__Postgres: "Host=localhost;Port=5432;Database=winnow_db;Username=winnow;Password=localpassword"
          S3Settings__Endpoint: "http://localhost:4566"
          RABBITMQ_HOST: "localhost"
          LlmSettings__Presidio__AnalyzerEndpoint: "http://localhost:5002"
          LlmSettings__Provider: "None"
          EmailSettings__Provider: "None"
        run: |
          dotnet run --project src/Services/Winnow.API/Winnow.API.csproj --configuration Release --no-build &
          echo "Waiting for API to start on port 5294..."
          for i in $(seq 1 60); do
            if curl -sf http://localhost:5294/health/live > /dev/null 2>&1; then
              echo "✅ API is ready!"
              break
            fi
            echo "  Attempt $i/60 — not ready yet, retrying in 2s..."
            sleep 2
          done
          curl -sf http://localhost:5294/health/live || (echo "❌ API failed to start" && exit 1)

      - name: Install JS Dependencies
        run: npm ci
        working-directory: src/Apps/Winnow.Client

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium
        working-directory: src/Apps/Winnow.Client

      - name: Run Playwright E2E Tests (Full Stack)
        run: npm run test:e2e:full
        working-directory: src/Apps/Winnow.Client
        env:
          VITE_API_URL: "http://localhost:5294"

      - name: Run Playwright E2E Tests (Demo Mode Safety)
        run: npm run test:e2e:demo
        working-directory: src/Apps/Winnow.Client

      - name: Upload Playwright Report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: src/Apps/Winnow.Client/playwright-report/
          retention-days: 30

  # ── Job 4: Security & License Scanning ──────────
  security:
    name: Source Security & License Scan
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore .NET Packages
        run: dotnet restore Winnow.sln -p:RestorePackagesWithLockFile=true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install JS Dependencies
        run: |
          npm ci --prefix src/Apps/Winnow.Client
          npm ci --prefix src/Sdks/Winnow.Sdk.Js

      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          severity: 'CRITICAL,HIGH'
          scanners: 'vuln,secret,license'

  # ── Job 4: Build & Push Docker Image to ECR ──────────────────────────────
  deploy:
    name: Build, Scan and Push to AWS ECR
    runs-on: ubuntu-latest
    needs: [test, drift-detection, e2e, security]
    if: github.ref == 'refs/heads/main'
    
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::717491933657:role/GitHubActions_winnow_DeployRole
          aws-region: us-east-2

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build Core API Image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: docker build -t $ECR_REGISTRY/winnow-core:$IMAGE_TAG -f src/Services/Winnow.API/Dockerfile .

      # ── THE SECURITY GATE (Trivy) ──
      - name: Run Trivy Vulnerability & License Scanner on Core API
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ steps.login-ecr.outputs.registry }}/winnow-core:${{ github.sha }}'
          format: 'table'
          exit-code: '1' # Fails the build if critical vulns or bad licenses are found
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'
          scanners: 'vuln,secret'

      - name: Push Core API Image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker push $ECR_REGISTRY/winnow-core:$IMAGE_TAG
          docker tag $ECR_REGISTRY/winnow-core:$IMAGE_TAG $ECR_REGISTRY/winnow-core:latest
          docker push $ECR_REGISTRY/winnow-core:latest
