name: CI — Build, Test & Drift Detection

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

jobs:
  # ── Job 1: Build & Test ────────────────────────────────────────────────────
  test:
    name: Build & Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: winnow
          POSTGRES_PASSWORD: winnow_test
          POSTGRES_DB: winnow_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U winnow"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=5

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore Winnow.sln

      - name: Build
        run: dotnet build Winnow.sln --no-restore

      - name: Test
        run: dotnet test Winnow.sln --no-build --verbosity normal
        env:
          ConnectionStrings__Postgres: "Host=localhost;Port=5432;Database=winnow_test;Username=winnow;Password=winnow_test"

  # ── Job 2: Migration Drift Detection ───────────────────────────────────────
  drift-detection:
    name: Migration Drift Detection
    runs-on: ubuntu-latest
    needs: test

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: winnow
          POSTGRES_PASSWORD: winnow_test
          POSTGRES_DB: winnow_drift
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U winnow"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=5

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Install EF Core Tools
        run: dotnet tool install --global dotnet-ef

      - name: Restore
        run: dotnet restore Winnow.sln

      - name: Build
        run: dotnet build Winnow.sln --no-restore

      - name: Check Postgres drift
        working-directory: src/Services/Winnow.API
        env:
          DatabaseProvider: Postgres
          ConnectionStrings__Postgres: "Host=localhost;Port=5432;Database=winnow_drift;Username=winnow;Password=winnow_test"
        run: |
          echo "🔍 Checking Postgres for pending model changes..."
          dotnet ef migrations has-pending-model-changes
          echo "✅ Postgres migrations are in sync."

  # ── Job 3: Build & Push Docker Image to ECR ──────────────────────────────
  deploy:
    name: Build and Push to AWS ECR
    runs-on: ubuntu-latest
    needs: [test, drift-detection]
    if: github.ref == 'refs/heads/main' # Only push images from main
    
    # REQUIRED for AWS OIDC authentication (No static keys!)
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::717491933657:role/GitHubActions_winnow_DeployRole
          aws-region: us-east-2

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push image to Amazon ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: winnow-core
          IMAGE_TAG: ${{ github.sha }}
        run: |
          echo "Building image..."
          # Note: Ensure the Dockerfile path matches your repository structure
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG -f src/Services/Winnow.API/Dockerfile .
          
          echo "Pushing commit hash tag..."
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          
          echo "Pushing latest tag..."
          docker tag $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG $ECR_REGISTRY/$ECR_REPOSITORY:latest
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest