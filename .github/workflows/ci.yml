name: CI — Build, Test & Drift Detection

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

jobs:
  # ── Job 1: Build & Test (.NET) ─────────────────────────────────────────────
  test-dotnet:
    name: Build & Test .NET Projects
    runs-on: ubuntu-latest
    permissions:
      contents: read

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: winnow
          POSTGRES_PASSWORD: winnow_test
          POSTGRES_DB: winnow_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U winnow"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=5

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: 'temurin'

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Set up NuGet Cache
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj', 'Winnow.sln') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Install SonarScanner
        run: dotnet tool install --global dotnet-sonarscanner

      - name: Begin Sonar Analysis
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: dotnet sonarscanner begin /k:"winnow-triage_winnow-core-api" /o:"winnow-triage" /d:sonar.token="${{ secrets.SONAR_TOKEN }}" /d:sonar.host.url="https://sonarcloud.io" /d:sonar.cs.opencover.reportsPaths="**/coverage.opencover.xml" /d:sonar.exclusions="**/*.js,**/*.jsx,**/*.ts,**/*.tsx,**/*.html,**/*.css"

      - name: Restore
        run: dotnet restore Winnow.sln

      - name: Build
        run: dotnet build Winnow.sln --no-restore

      - name: Test
        run: dotnet test Winnow.sln --no-build --verbosity normal --logger "trx;LogFileName=test-results.trx" --logger "GitHubActions" /p:CollectCoverage=true /p:CoverletOutputFormat=opencover
        env:
          ConnectionStrings__Postgres: "Host=localhost;Port=5432;Database=winnow_test;Username=winnow;Password=winnow_test"

      - name: End Sonar Analysis
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: dotnet sonarscanner end /d:sonar.token="${{ secrets.SONAR_TOKEN }}"

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-dotnet
          path: "**/test-results.trx"
  # ── Job 2: Build & Test (UI/JS) ────────────────────────────────────────────
  test-ui:
    name: Build & Test JS/UI Projects
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: 'src/Apps/Winnow.Client/package-lock.json'

      - name: Install JS Dependencies (Client)
        run: npm ci
        working-directory: src/Apps/Winnow.Client

      - name: Test UI Client
        run: npm test -- --coverage
        working-directory: src/Apps/Winnow.Client

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-ui
          path: src/Apps/Winnow.Client/test-results.xml

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectBaseDir: src/Apps/Winnow.Client
          args: >
            -Dsonar.projectKey=winnow-triage_winnow-core-ui
            -Dsonar.organization=winnow-triage
            -Dsonar.host.url=https://sonarcloud.io
            -Dsonar.sources=src
            -Dsonar.javascript.lcov.reportPaths=coverage/lcov.info

  # ── Job 3: Migration Drift Detection ───────────────────────────────────────
  drift-detection:
    name: Migration Drift Detection
    runs-on: ubuntu-latest
    needs: test-dotnet

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: winnow
          POSTGRES_PASSWORD: winnow_test
          POSTGRES_DB: winnow_drift
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U winnow"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=5

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Install EF Core Tools
        run: dotnet tool install --global dotnet-ef

      - name: Restore
        run: dotnet restore Winnow.sln

      - name: Build
        run: dotnet build Winnow.sln --no-restore

      - name: Check Postgres drift
        working-directory: src/Services/Winnow.API
        env:
          DatabaseProvider: Postgres
          ConnectionStrings__Postgres: "Host=localhost;Port=5432;Database=winnow_drift;Username=winnow;Password=winnow_test"
        run: |
          echo "🔍 Checking Postgres for pending model changes..."
          dotnet ef migrations has-pending-model-changes
          echo "✅ Postgres migrations are in sync."

  # ── Job 4: E2E Playwright Tests ────────────────────────────────────────────
  e2e:
    name: E2E Playwright Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
    needs: [test-dotnet, test-ui]

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: winnow
          POSTGRES_PASSWORD: localpassword
          POSTGRES_DB: winnow_db
        ports:
          - 5432:5432
      redis:
        image: redis:alpine
        ports:
          - 6379:6379
      ministack:
        image: nahuelnucera/ministack:latest
        env:
          S3_PERSIST: 0
          SERVICES: s3,sqs
        ports:
          - 4566:4566
      rabbitmq:
        image: rabbitmq:3-management
        ports:
          - 5672:5672
          - 15672:15672
      presidio-analyzer:
        image: mcr.microsoft.com/presidio-analyzer:latest
        env:
          PORT: 3000
        ports:
          - 5002:3000

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: 'src/Apps/Winnow.Client/package-lock.json'

      - name: Restore & Build Backend Services
        run: |
          dotnet restore Winnow.sln
          dotnet build src/Services/Winnow.API/Winnow.API.csproj --configuration Release
          dotnet build src/Services/Winnow.Sanitize/Winnow.Sanitize.csproj --configuration Release

      - name: Setup Ministack Buckets
        run: |
          docker run --network host amazon/aws-cli:latest --endpoint-url=http://localhost:4566 s3 mb s3://winnow-quarantine || true
          docker run --network host amazon/aws-cli:latest --endpoint-url=http://localhost:4566 s3 mb s3://winnow-clean || true
          docker run --network host amazon/aws-cli:latest --endpoint-url=http://localhost:4566 s3 mb s3://winnow-security-defs || true

      - name: Start Winnow Backend Services
        env:
          ASPNETCORE_ENVIRONMENT: Development
          ASPNETCORE_URLS: "http://localhost:5294"
          ConnectionStrings__Postgres: "Host=localhost;Port=5432;Database=winnow_db;Username=winnow;Password=localpassword"
          S3Settings__Endpoint: "http://localhost:4566"
          RABBITMQ_HOST: "localhost"
          LlmSettings__Presidio__AnalyzerEndpoint: "http://localhost:5002"
          LlmSettings__Provider: "None"
          EmailSettings__Provider: "None"
          Encryption__MasterKey: "NF9Jh9TwWEbOgVCkKiEwbXcRHhyKPVHhIMeUzDn0zYg="
          AppUrl: "http://localhost:5173"
        run: |
          ASPNETCORE_URLS="http://localhost:5295" dotnet run --project src/Services/Winnow.Sanitize/Winnow.Sanitize.csproj --configuration Release --no-build &
          dotnet run --project src/Services/Winnow.API/Winnow.API.csproj --configuration Release --no-build &
          echo "Waiting for API to start on port 5294..."
          for i in $(seq 1 60); do
            if curl -sf http://localhost:5294/health/live > /dev/null 2>&1; then
              echo "✅ API is ready!"
              break
            fi
            echo "  Attempt $i/60 — not ready yet, retrying in 2s..."
            sleep 2
          done
          curl -sf http://localhost:5294/health/live || (echo "❌ API failed to start" && exit 1)

          echo "Waiting for Sanitize to start on port 5295..."
          for i in $(seq 1 60); do
            if curl -sf http://localhost:5295/healthz > /dev/null 2>&1; then
              echo "✅ Sanitize is ready!"
              break
            fi
            echo "  Attempt $i/60 — sanitize not ready yet, retrying in 2s..."
            sleep 2
          done
          curl -sf http://localhost:5295/healthz || (echo "❌ Sanitize failed to start" && exit 1)

      - name: Install JS Dependencies
        run: npm ci
        working-directory: src/Apps/Winnow.Client

      - name: Cache Playwright Browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('src/Apps/Winnow.Client/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install Playwright Browsers
        run: npx playwright install chromium --with-deps
        working-directory: src/Apps/Winnow.Client

      - name: Run Playwright E2E Tests (Full Stack)
        run: npm run test:e2e:full
        working-directory: src/Apps/Winnow.Client
        env:
          VITE_API_URL: "http://localhost:5294"

      - name: Run Playwright E2E Tests (Demo Mode Safety)
        run: npm run test:e2e:demo
        working-directory: src/Apps/Winnow.Client

      - name: Upload Playwright Report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: src/Apps/Winnow.Client/playwright-report/
          retention-days: 30

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-e2e
          path: src/Apps/Winnow.Client/playwright-report/results.xml

  # ── Job 5: Unified Test Report ─────────────────────────────────────────────
  report-tests:
    name: Unified Test Report
    runs-on: ubuntu-latest
    if: always()
    needs: [test-dotnet, test-ui, e2e]
    permissions:
      checks: write
      pull-requests: write
      contents: read

    steps:
      - name: Download All Results
        uses: actions/download-artifact@v4
        with:
          pattern: test-results-*
          merge-multiple: true
          path: all-results

      - name: Publish Unified Test Report
        uses: EnricoMi/publish-unit-test-result-action@v2
        with:
          files: |
            all-results/**/*.xml
            all-results/**/*.trx
          check_name: "Unified Test Results"
          comment_title: "Unified Test Results"

  # ── Job 6: Security & License Scanning ──────────
  security:
    name: Source Security & License Scan
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore .NET Packages
        run: dotnet restore Winnow.sln -p:RestorePackagesWithLockFile=true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: 'src/Apps/Winnow.Client/package-lock.json'

      - name: Install JS Dependencies
        run: |
          npm ci --prefix src/Apps/Winnow.Client
          npm ci --prefix src/Sdks/Winnow.Sdk.Js

      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          severity: 'CRITICAL,HIGH'
          scanners: 'vuln,secret,license'
  # ── Job 7: Build & Push Docker Image to ECR ──────────────────────────────
  build-and-push:
    name: Build, Scan and Push to AWS ECR
    runs-on: ubuntu-latest
    environment: production
    needs: [test-dotnet, test-ui, drift-detection, e2e, security]
    if: github.ref == 'refs/heads/main'
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: winnow-core/winnow-api
            dockerfile: src/Services/Winnow.API/Dockerfile
          - image: winnow-core/winnow-sanitize
            dockerfile: src/Services/Winnow.Sanitize/Dockerfile
          - image: winnow-core/winnow-summary
            dockerfile: src/Services/Winnow.Summary/Dockerfile
          - image: winnow-core/winnow-clustering
            dockerfile: src/Services/Winnow.Clustering/Dockerfile
          - image: winnow-core/winnow-notifications
            dockerfile: src/Services/Winnow.Notifications/Dockerfile

    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::717491933657:role/GitHubActions_winnow_DeployRole
          aws-region: us-east-2

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Download HuggingFace ONNX Model
        run: |
          echo "⬇️ Downloading Xenova/all-MiniLM-L6-v2 ONNX model binaries..."
          mkdir -p src/Services/Winnow.API/AiModel
          curl -s -L -o src/Services/Winnow.API/AiModel/model.onnx https://huggingface.co/Xenova/all-MiniLM-L6-v2/resolve/main/onnx/model.onnx
          curl -s -L -o src/Services/Winnow.API/AiModel/vocab.txt https://huggingface.co/Xenova/all-MiniLM-L6-v2/resolve/main/vocab.txt
          curl -s -L -o src/Services/Winnow.API/AiModel/tokenizer.json https://huggingface.co/Xenova/all-MiniLM-L6-v2/resolve/main/tokenizer.json

      - name: Build Image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: docker build -t $ECR_REGISTRY/${{ matrix.image }}:$IMAGE_TAG -f ${{ matrix.dockerfile }} .

      # ── THE SECURITY GATE (Trivy) ──
      - name: Run Trivy Vulnerability Scanner on Image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ steps.login-ecr.outputs.registry }}/${{ matrix.image }}:${{ github.sha }}'
          format: 'table'
          exit-code: '1' # Fails the build if critical vulns or bad licenses are found
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'
          scanners: 'vuln,secret'

      - name: Push Image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker push $ECR_REGISTRY/${{ matrix.image }}:$IMAGE_TAG
          docker tag $ECR_REGISTRY/${{ matrix.image }}:$IMAGE_TAG $ECR_REGISTRY/${{ matrix.image }}:latest
          docker push $ECR_REGISTRY/${{ matrix.image }}:latest

  # ── Job 8: Trigger Deployment (GitOps) ────────────────────────────────
  trigger-deploy:
    name: Trigger Deploy in winnow-infra
    runs-on: ubuntu-latest
    environment: production
    needs: build-and-push
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Trigger Pipeline
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.INFRA_REPO_PAT }}
          repository: winnow-triage/winnow-infra
          event-type: deploy_trigger
          client-payload: '{"core_image_tag": "${{ github.sha }}"}'
