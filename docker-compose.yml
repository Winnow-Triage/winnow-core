version: '3.8'

services:
  # 1. The Database
  postgres:
    image: pgvector/pgvector:pg18
    container_name: winnow-postgres
    environment:
      POSTGRES_USER: winnow
      POSTGRES_PASSWORD: localpassword
      POSTGRES_DB: winnow_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
    networks:
      - winnow-net

  redis:
    image: redis:alpine
    container_name: winnow-redis
    ports:
      - "6379:6379"
    networks:
      - winnow-net

  mailpit:
    image: axllent/mailpit:latest
    container_name: winnow-mailpit
    restart: unless-stopped
    ports:
      - "8025:8025"
      - "1025:1025"
    environment:
      - MP_MAX_MESSAGES=500
    networks:
      - winnow-net

  # LocalStack for SQS
  ministack:
    image: nahuelnucera/ministack:latest
    container_name: winnow-ministack
    ports:
      - "4566:4566"
    environment:
      - S3_PERSIST=0
      - SERVICES=s3,sqs
    networks:
      - winnow-net

  ministack-setup:
    image: amazon/aws-cli:latest
    container_name: winnow-ministack-setup
    network_mode: "host"
    depends_on:
      - ministack
    environment:
      - AWS_ACCESS_KEY_ID=minioadmin
      - AWS_SECRET_ACCESS_KEY=minioadmin
      - AWS_DEFAULT_REGION=us-east-1
    entrypoint: ""
    command: /bin/sh -c "until aws --endpoint-url=http://localhost:4566 s3 ls > /dev/null 2>&1; do echo 'Waiting for S3 backend to boot...'; sleep 3; done && aws --endpoint-url=http://localhost:4566 s3 mb s3://winnow-quarantine || true && aws --endpoint-url=http://localhost:4566 s3 mb s3://winnow-clean || true && aws --endpoint-url=http://localhost:4566 s3 mb s3://winnow-security-defs || true"

  presidio-analyzer:
    image: mcr.microsoft.com/presidio-analyzer:latest
    container_name: winnow-presidio
    ports:
      - "5002:3000"
    environment:
      - PORT=3000
    networks:
      - winnow-net

  # RabbitMQ for MassTransit
  rabbitmq:
    image: rabbitmq:3-management
    container_name: winnow-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    networks:
      - winnow-net

  # 3. The "Bouncer" (Virus & File Check)
  bouncer:
    build:
      context: ../winnow-bouncer
      dockerfile: Dockerfile
    container_name: winnow-bouncer
    network_mode: "host"
    tmpfs:
      - /tmp
      - /run
    depends_on:
      - ministack
      - ministack-setup
    command: /bin/sh -c "echo 'Waiting 10s for S3...' && sleep 10 && ./bouncer"
    environment:
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
      S3_ENDPOINT: http://localhost:4566
      S3_BUCKET_QUARANTINE: winnow-quarantine
      S3_BUCKET_CLEAN: winnow-clean
      S3_BUCKET_DEFS: winnow-security-defs
      S3_FORCE_PATH_STYLE: "true"
      CALLBACK_URL: http://localhost:5000/assets/status
    volumes:
      - clamav_defs:/var/lib/clamav:U

  # 3b. ClamAV Definition Updater
  clamav-updater:
    build:
      context: ../winnow-bouncer/deploy/def-updater
      dockerfile: Dockerfile.updater
    container_name: winnow-clamav-updater
    network_mode: "host"
    depends_on:
      - ministack
      - ministack-setup
    command: /bin/sh -c "echo 'Waiting 10s for S3...' && sleep 10 && ./sync.sh"
    environment:
      - AWS_ACCESS_KEY_ID=minioadmin
      - AWS_SECRET_ACCESS_KEY=minioadmin
      - AWS_ENDPOINT_URL=http://localhost:4566
      - S3_FORCE_PATH_STYLE=true
    volumes:
      - clamav_defs:/var/lib/clamav:U

  # 4. Your .NET API
  api:
    build:
      context: .
      dockerfile: src/Services/Winnow.API/Dockerfile
    container_name: winnow-api
    network_mode: "host"
    depends_on:
      - postgres
      - ministack
      - rabbitmq
      - mailpit
      - presidio-analyzer
    environment:
      - ASPNETCORE_HTTP_PORTS=5000
      - ASPNETCORE_hostBuilder_reloadConfigOnChange=false
      - ConnectionStrings__Postgres=Host=localhost;Port=5432;Database=winnow_db;Username=winnow;Password=localpassword;Maximum Pool Size=4;Minimum Pool Size=0
      - S3Settings__Endpoint=http://localhost:4566
      - LlmSettings__Provider=Ollama
      - LlmSettings__Ollama__Endpoint=http://localhost:11434
      - LlmSettings__Ollama__ModelId=llama3.2
      - LlmSettings__Ollama__GatekeeperModelId=llama3.2
      - LlmSettings__Presidio__AnalyzerEndpoint=http://localhost:5002
      - EmailSettings__Smtp__Host=localhost
      - AWS_ACCESS_KEY_ID=minioadmin
      - AWS_SECRET_ACCESS_KEY=minioadmin
      - S3_ForcePathStyle=true
      - RABBITMQ_HOST=localhost
      - Encryption__MasterKey=NF9Jh9TwWEbOgVCkKiEwbXcRHhyKPVHhIMeUzDn0zYg=
      - ConnectionStrings__Redis=localhost:6379

  # 5. Sanitize Worker
  sanitize:
    build:
      context: .
      dockerfile: src/Services/Winnow.Sanitize/Dockerfile
    container_name: winnow-sanitize
    network_mode: "host"
    depends_on:
      - rabbitmq
    environment:
      - ASPNETCORE_HTTP_PORTS=5001
      - ASPNETCORE_hostBuilder_reloadConfigOnChange=false
      - RABBITMQ_HOST=localhost
      - ConnectionStrings__Postgres=Host=localhost;Port=5432;Database=winnow_db;Username=winnow;Password=localpassword;Maximum Pool Size=4;Minimum Pool Size=0
      - S3Settings__Endpoint=http://localhost:4566
      - LlmSettings__Provider=Ollama
      - LlmSettings__Ollama__Endpoint=http://localhost:11434
      - LlmSettings__Ollama__ModelId=llama3.2
      - LlmSettings__Ollama__GatekeeperModelId=llama3.2
      - LlmSettings__Presidio__AnalyzerEndpoint=http://localhost:5002
      - AWS_ACCESS_KEY_ID=minioadmin
      - AWS_SECRET_ACCESS_KEY=minioadmin
      - Encryption__MasterKey=NF9Jh9TwWEbOgVCkKiEwbXcRHhyKPVHhIMeUzDn0zYg=
      - ConnectionStrings__Redis=localhost:6379

  # 6. Clustering Worker
  clustering:
    build:
      context: .
      dockerfile: src/Services/Winnow.Clustering/Dockerfile
    container_name: winnow-clustering
    network_mode: "host"
    depends_on:
      - rabbitmq
    environment:
      - ASPNETCORE_HTTP_PORTS=5003
      - ASPNETCORE_hostBuilder_reloadConfigOnChange=false
      - RABBITMQ_HOST=localhost
      - ConnectionStrings__Postgres=Host=localhost;Port=5432;Database=winnow_db;Username=winnow;Password=localpassword;Maximum Pool Size=4;Minimum Pool Size=0
      - S3Settings__Endpoint=http://localhost:4566
      - LlmSettings__Provider=Ollama
      - LlmSettings__Ollama__Endpoint=http://localhost:11434
      - LlmSettings__Ollama__ModelId=llama3.2
      - LlmSettings__Ollama__GatekeeperModelId=llama3.2
      - AWS_ACCESS_KEY_ID=minioadmin
      - AWS_SECRET_ACCESS_KEY=minioadmin
      - Encryption__MasterKey=NF9Jh9TwWEbOgVCkKiEwbXcRHhyKPVHhIMeUzDn0zYg=
      - ConnectionStrings__Redis=localhost:6379

  # 7. Summary Worker
  summary:
    build:
      context: .
      dockerfile: src/Services/Winnow.Summary/Dockerfile
    container_name: winnow-summary
    network_mode: "host"
    depends_on:
      - rabbitmq
    environment:
      - ASPNETCORE_HTTP_PORTS=5004
      - ASPNETCORE_hostBuilder_reloadConfigOnChange=false
      - RABBITMQ_HOST=localhost
      - ConnectionStrings__Postgres=Host=localhost;Port=5432;Database=winnow_db;Username=winnow;Password=localpassword;Maximum Pool Size=4;Minimum Pool Size=0
      - S3Settings__Endpoint=http://localhost:4566
      - LlmSettings__Provider=Ollama
      - LlmSettings__Ollama__Endpoint=http://localhost:11434
      - LlmSettings__Ollama__ModelId=llama3.2
      - LlmSettings__Ollama__GatekeeperModelId=llama3.2
      - AWS_ACCESS_KEY_ID=minioadmin
      - AWS_SECRET_ACCESS_KEY=minioadmin
      - Encryption__MasterKey=NF9Jh9TwWEbOgVCkKiEwbXcRHhyKPVHhIMeUzDn0zYg=
      - ConnectionStrings__Redis=localhost:6379

  # 8. Notifications Worker
  notifications:
    build:
      context: .
      dockerfile: src/Services/Winnow.Notifications/Dockerfile
    container_name: winnow-notifications
    network_mode: "host"
    depends_on:
      - rabbitmq
    environment:
      - ASPNETCORE_HTTP_PORTS=5005
      - ASPNETCORE_hostBuilder_reloadConfigOnChange=false
      - RABBITMQ_HOST=localhost
      - ConnectionStrings__Postgres=Host=localhost;Port=5432;Database=winnow_db;Username=winnow;Password=localpassword;Maximum Pool Size=4;Minimum Pool Size=0
      - S3Settings__Endpoint=http://localhost:4566
      - AWS_ACCESS_KEY_ID=minioadmin
      - AWS_SECRET_ACCESS_KEY=minioadmin
      - Encryption__MasterKey=NF9Jh9TwWEbOgVCkKiEwbXcRHhyKPVHhIMeUzDn0zYg=
      - ConnectionStrings__Redis=localhost:6379
      - DiscordOps__NewSignupsUrl=https://discord.com/api/webhooks/1490035059993088091/IUcwd7bWN4G3pJDGT7IR5BVir4UGS-8NPODznNHl4baZ0C1SjKFtXdsuf-KQZv5pOU-K
      - DiscordOps__DlqAlertsUrl=REPLACE_WITH_ENV_VAR
      - DiscordOps__StripePaymentsUrl=REPLACE_WITH_ENV_VAR

  # 9. React Client Frontend
  client:
    build:
      context: ./src/Apps/Winnow.Client
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=http://localhost:5000
    container_name: winnow-client
    ports:
      - "5173:80"
    networks:
      - winnow-net

networks:
  winnow-net:
    driver: bridge

volumes:
  postgres_data:
  clamav_defs: