apiVersion: apps/v1
kind: Deployment
metadata:
  name: winnow-bouncer
  namespace: winnow-system
  labels:
    app: winnow-bouncer
spec:
  replicas: 1 # This will be overridden by KEDA
  selector:
    matchLabels:
      app: winnow-bouncer
  template:
    metadata:
      labels:
        app: winnow-bouncer
    spec:
      containers:
      - name: bouncer
        image: winnow-bouncer:latest # Assumes local registry or built image
        imagePullPolicy: IfNotPresent
        env:
        - name: BOUNCER_S3_ENDPOINT
          value: "http://minio:9000"
        - name: BOUNCER_REGION
          value: "us-east-1"
        - name: BOUNCER_QUARANTINE_BUCKET
          value: "winnow-quarantine"
        - name: BOUNCER_CLEAN_BUCKET
          value: "winnow-assets"
        - name: BOUNCER_SQS_QUEUE_URL
          value: "http://ministack:4566/000000000000/winnow-quarantine-queue"
        - name: AWS_ACCESS_KEY_ID
          valueFrom:
            secretKeyRef:
              name: bouncer-secrets
              key: aws-access-key
        - name: AWS_SECRET_ACCESS_KEY
          valueFrom:
            secretKeyRef:
              name: bouncer-secrets
              key: aws-secret-key
---
apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: winnow-bouncer-scaler
  namespace: winnow-system
spec:
  scaleTargetRef:
    name: winnow-bouncer
  minReplicaCount: 0  # Scale to zero when queue is empty!
  maxReplicaCount: 10 # Scale up to 10 workers during a crash storm
  cooldownPeriod: 60  # Wait 60s of empty queue before scaling down
  pollingInterval: 5  # Check the queue depth every 5 seconds
  triggers:
  - type: aws-sqs-queue
    metadata:
      queueURL: "http://ministack:4566/000000000000/winnow-quarantine-queue"
      queueLength: "5" # Scale up for every 5 messages in the queue
      awsRegion: "us-east-1"
      identityOwner: pod # Use pod identity/env vars for auth
